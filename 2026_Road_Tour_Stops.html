<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Road Tour — Stop Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0; --surface: #FFFFFF; --border: #E2DED6;
    --text-primary: #1A1815; --text-secondary: #6B6860; --text-muted: #A09C96;
    --accent: #1A5C40; --accent-light: #EAF3DE; --accent-text: #1A5C40;
    --warn: #8C5A00; --warn-bg: #FEF3DC; --warn-border: #F5D690;
    --month-rule: #D4CFC7; --tab-active-bg: #1A1815; --tab-active-text: #F7F5F0;
    --past-border: #EAE7E2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; }

  header { padding: 40px 48px 0; border-bottom: 1px solid var(--border); background: var(--surface); }
  .inner { max-width: 1136px; margin: 0 auto; }
  .eyebrow { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; }
  .meta { margin-top: 6px; font-size: 14px; color: var(--text-secondary); }

  .tabs { display: flex; gap: 4px; padding: 24px 0 0; }
  .tab-btn { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 8px 20px; border-radius: 6px; border: 1px solid transparent; cursor: pointer; background: transparent; color: var(--text-secondary); transition: all 0.15s; }
  .tab-btn:hover { background: var(--bg); color: var(--text-primary); }
  .tab-btn.active { background: var(--tab-active-bg); color: var(--tab-active-text); }

  .main { padding: 28px 32px 64px; max-width: 1200px; margin: 0 auto; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* FILTERS */
  .filter-bar { display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-start; margin-bottom: 20px; padding: 16px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
  .filter-group { display: flex; flex-direction: column; gap: 6px; }
  .filter-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
  .chip-row { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; padding: 4px 11px; border-radius: 20px; border: 1px solid #D4CFC7; background: #FFFFFF; color: var(--text-secondary); cursor: pointer; transition: all 0.12s; white-space: nowrap; }
  .chip:hover { border-color: #A09C96; color: var(--text-primary); }
  .chip.active { background: #1A1815; color: #F7F5F0; border-color: #1A1815; }
  .filter-reset { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--text-muted); background: none; border: none; cursor: pointer; padding: 4px 0; text-decoration: underline; text-underline-offset: 2px; margin-left: auto; align-self: flex-end; }
  .filter-reset:hover { color: var(--text-primary); }

  /* SUMMARY BAR */
  .summary-bar { display: flex; gap: 24px; margin-bottom: 20px; padding: 14px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
  .summary-item { display: flex; flex-direction: column; gap: 2px; }
  .summary-num { font-size: 22px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.02em; font-family: 'DM Mono', monospace; }
  .summary-label { font-size: 12px; color: var(--text-secondary); }
  .summary-divider { width: 1px; background: var(--border); align-self: stretch; }

  .no-results { padding: 40px 0; text-align: center; color: var(--text-muted); font-size: 14px; }

  /* PAST / FUTURE DIVIDER */
  .section-divider { display: flex; align-items: center; gap: 12px; margin: 16px 0 4px; }
  .section-divider-line { flex: 1; height: 1px; background: #3B6D11; opacity: 0.25; }
  .section-divider-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #3B6D11; white-space: nowrap; }

  /* MONTH HEADERS */
  .month-label { font-family: 'DM Mono', monospace; font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); padding: 20px 0 8px; border-top: 1px solid var(--month-rule); }
  .month-label.first-label { border-top: none; padding-top: 0; }
  .month-label.past { color: #C0BDB8; border-top-color: var(--past-border); }

  /* STOP ROWS — 7 columns: date | time | city | venue | owner | badge | rep */
  .stop-row { display: grid; grid-template-columns: 62px 96px 130px 1fr 110px auto 130px; align-items: baseline; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 14px; line-height: 1.5; }
  .stop-row:last-child { border-bottom: none; }
  .stop-row.is-past { border-bottom-color: var(--past-border); }
  .col-date { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-secondary); }
  .col-time { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
  .col-time.no-time { color: var(--text-muted); font-style: italic; font-family: 'DM Sans', sans-serif; font-size: 12px; }
  .col-city { font-weight: 500; font-size: 13px; }
  .col-venue { color: var(--text-secondary); font-size: 13px; }
  .col-owner { font-size: 12px; color: var(--text-secondary); }
  .col-badge { display: flex; justify-content: flex-end; }
  .col-rep { font-size: 11px; color: var(--text-muted); text-align: right; }

  /* Past row dimming */
  .stop-row.is-past .col-date,
  .stop-row.is-past .col-time { color: #C0BDB8; }
  .stop-row.is-past .col-city { color: var(--text-muted); }
  .stop-row.is-past .col-venue,
  .stop-row.is-past .col-owner,
  .stop-row.is-past .col-rep { color: #C0BDB8; }

  /* BADGES */
  .badge-confirmed { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; color: var(--accent-text); background: var(--accent-light); border-radius: 4px; padding: 2px 8px; }
  .badge-confirmed::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; }
  .badge-unconfirmed { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; color: var(--warn); background: var(--warn-bg); border: 1px solid var(--warn-border); border-radius: 4px; padding: 2px 8px; }
  .badge-unconfirmed::before { content: '?'; font-family: 'DM Mono', monospace; font-size: 10px; }
  .stop-row.is-past .badge-confirmed { background: #F1EFE8; color: #B0ACA6; }
  .stop-row.is-past .badge-confirmed::before { background: #C8C5C0; }
  .stop-row.is-past .badge-unconfirmed { background: #F9F8F6; color: #B0ACA6; border-color: #E2DED6; }

  /* MAP */
  #map-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; position: relative; }
  #map-svg { display: block; width: 100%; }
  .map-tooltip { position: absolute; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 13px; pointer-events: none; opacity: 0; transition: opacity 0.12s; max-width: 260px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); z-index: 10; }
  .tt-stop + .tt-stop { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .tt-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
  .tt-city { font-weight: 600; font-size: 13px; }
  .tt-venue { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
  .tt-tag { font-size: 11px; margin-top: 3px; }
  .tt-tag.warn { color: var(--warn); }
  .tt-tag.past { color: var(--text-muted); }
  .map-legend { display: flex; gap: 20px; padding: 12px 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-secondary); flex-wrap: wrap; }
  .legend-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }

  @media (max-width: 780px) {
    header { padding: 28px 20px 0; }
    .main { padding-left: 20px; padding-right: 20px; }
    .stop-row { grid-template-columns: 56px 80px 1fr; gap: 8px; }
    .col-venue, .col-rep, .col-badge { display: none; }
  }
</style>
</head>

    </div>
  </div>
</header>

<div class="main">

      <div class="summary-divider"></div>
      <div class="summary-item"><span class="summary-num" id="city-count">—</span><span class="summary-label">Cities</span></div>
    </div>
    <div id="stop-list"></div>

  <div id="panel-map" class="panel">
    <div id="map-wrap">

    </div>

</div>

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const TODAY = new Date(); TODAY.setHours(0,0,0,0);
function parseDate(d) { const p = d.split('-'); return new Date(+p[0], +p[1]-1, +p[2]); }
function isPast(d) { return parseDate(d) < TODAY; }
function fmtDate(d) { const p = d.split('-'); return MONTHS_SHORT[+p[1]-1] + ' ' + parseInt(p[2]); }
function monthKey(d) { const p = d.split('-'); return p[1] + '-' + p[0]; }
function monthLabel(d) { const p = d.split('-'); return MONTHS[+p[1]-1] + ' ' + p[0]; }

const filters = { months: new Set(), states: new Set(), reps: new Set() };
const allMonths = [...new Set(stops.map(s => monthKey(s.date)))].sort();
const allStates = [...new Set(stops.map(s => s.state).filter(Boolean))].sort();
const allReps = [...new Set(stops.map(s => s.rep))].sort();

const REP_SHORT = {
  'Access Reps':'Access Reps', 'Atlantic Integrated':'Atlantic Int.', 'AWA Reps':'AWA Reps',
  'Bell & McCoy':'Bell & McCoy', 'High Tech Network':'Hi-Tech Net.',
  'LK & Associates':'LK & Assoc.', 'NuTech':'NuTech',
  'Performance Sales & Marketing':'Perf. Sales', 'Progressive':'Progressive', 'Unified Reps':'Unified Reps',
};

function buildChips() {
  document.getElementById('month-chips').innerHTML = allMonths.map(mk => {
    const p = mk.split('-'); const label = MONTHS_SHORT[+p[0]-1];
    return `<button class="chip" onclick="toggleChip(this,'months','${mk}')">${label}</button>`;
  }).join('');
  document.getElementById('state-chips').innerHTML = allStates.map(s =>
    `<button class="chip" onclick="toggleChip(this,'states','${s}')">${s}</button>`
  ).join('');
  document.getElementById('rep-chips').innerHTML = allReps.map(r => {
    const short = REP_SHORT[r] || r;
    const safe = encodeURIComponent(r);
    return `<button class="chip" onclick="toggleChip(this,'reps','${safe}')" title="${r}">${short}</button>`;
  }).join('');
}

function toggleChip(btn, type, val) {
  const v = type === 'reps' ? decodeURIComponent(val) : val;
  if (filters[type].has(v)) { filters[type].delete(v); btn.classList.remove('active'); }
  else { filters[type].add(v); btn.classList.add('active'); }
  applyFilters();
}

function resetFilters() {
  ['months','states','reps'].forEach(t => filters[t].clear());
  document.querySelectorAll('.chip.active').forEach(c => c.classList.remove('active'));
  applyFilters();
}

function filteredStops() {
  return stops.filter(s => {
    if (filters.months.size && !filters.months.has(monthKey(s.date))) return false;
    if (filters.states.size && !filters.states.has(s.state)) return false;
    if (filters.reps.size && !filters.reps.has(s.rep)) return false;
    return true;
  });
}

function applyFilters() { renderList(); if (window._mapDrawn) renderMapDots(); }

function renderList() {
  const fs = filteredStops();
  const el = document.getElementById('stop-list');
  if (!fs.length) {
    el.innerHTML = '<div class="no-results">No stops match the selected filters.</div>';
    ['total-count','conf-count','unconf-count','city-count'].forEach(id => document.getElementById(id).textContent = '0');
    return;
  }

  const pastStops = fs.filter(s => isPast(s.date));
  const futureStops = fs.filter(s => !isPast(s.date));
  let html = ''; let firstLabel = true;

  function renderGroup(group, past) {
    let curMonth = '';
    for (const s of group) {
      const mo = monthLabel(s.date);
      if (mo !== curMonth) {
        curMonth = mo;
        const cls = ['month-label', firstLabel ? 'first-label' : '', past ? 'past' : ''].filter(Boolean).join(' ');
        html += `<div class="${cls}">${mo}</div>`;
        firstLabel = false;
      }
      const badge = s.confirmed
        ? '<span class="badge-confirmed">Confirmed</span>'
        : '<span class="badge-unconfirmed">Not confirmed</span>';
      const timeCell = s.time
        ? `<span class="col-time">${s.time}</span>`
        : `<span class="col-time no-time">TBD</span>`;
      html += `<div class="stop-row${past ? ' is-past' : ''}">
        <span class="col-date">${fmtDate(s.date)}</span>
        ${timeCell}
        <span class="col-city">${s.city}</span>
        <span class="col-venue">${s.venue}</span>
        <span class="col-owner">${s.owner || '—'}</span>
        <span class="col-badge">${badge}</span>
        <span class="col-rep">${s.rep}</span>
      </div>`;
    }
  }

  renderGroup(pastStops, true);
  if (pastStops.length && futureStops.length) {
    html += `<div class="section-divider"><div class="section-divider-line"></div><div class="section-divider-label">Upcoming stops</div><div class="section-divider-line"></div></div>`;
    firstLabel = true;
  }
  renderGroup(futureStops, false);
  el.innerHTML = html;

  const confirmed = fs.filter(s => s.confirmed).length;
  const cities = new Set(fs.filter(s => s.city !== 'TBD').map(s => s.city)).size;
  document.getElementById('total-count').textContent = fs.length;
  document.getElementById('conf-count').textContent = confirmed;
  document.getElementById('unconf-count').textContent = fs.length - confirmed;
  document.getElementById('city-count').textContent = cities;
}

function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.textContent.trim() === (t === 'list' ? 'Sorted list' : 'Map view'))
  );
  document.getElementById('panel-list').classList.toggle('active', t === 'list');
  document.getElementById('panel-map').classList.toggle('active', t === 'map');
  if (t === 'map') { if (!window._mapDrawn) drawMap(); else renderMapDots(); }
}

function drawMap() {
  window._mapDrawn = true;
  const svg = d3.select('#map-svg');
  const proj = d3.geoAlbersUsa().scale(1200).translate([480, 270]);
  const path = d3.geoPath(proj);
  d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(us => {
    svg.selectAll('path.state').data(topojson.feature(us, us.objects.states).features)
      .join('path').attr('class','state').attr('d',path)
      .attr('fill','#F0EDE6').attr('stroke','#D4CECE').attr('stroke-width','0.6');
    renderMapDots();
  });
}

function renderMapDots() {
  const svg = d3.select('#map-svg');
  const proj = d3.geoAlbersUsa().scale(1200).translate([480, 270]);
  const tooltip = document.getElementById('tooltip');
  const wrap = document.getElementById('map-wrap');
  svg.selectAll('circle.dot').remove();

  const fs = filteredStops().filter(s => s.lat && s.lng);
  const groups = {};
  for (const s of fs) {
    const k = `${s.lat.toFixed(2)},${s.lng.toFixed(2)}`;
    if (!groups[k]) groups[k] = { lat: s.lat, lng: s.lng, items: [] };
    groups[k].items.push(s);
  }

  Object.values(groups).forEach(g => {
    const p = proj([g.lng, g.lat]);
    if (!p) return;
    const allPast = g.items.every(i => isPast(i.date));
    const someUnconf = g.items.some(i => !i.confirmed);
    const fill = allPast ? '#C0BDB8' : someUnconf ? '#B87D00' : '#1A5C40';
    const stroke = allPast ? '#A09C96' : someUnconf ? '#8C5A00' : '#0D3D28';

    svg.append('circle').attr('class','dot')
      .attr('cx', p[0]).attr('cy', p[1]).attr('r', 7)
      .attr('fill', fill).attr('stroke', stroke).attr('stroke-width','1.5')
      .style('cursor','pointer')
      .on('mousemove', event => {
        const rect = wrap.getBoundingClientRect();
        const x = event.clientX - rect.left, y = event.clientY - rect.top;
        tooltip.innerHTML = g.items.map(s => {
          const timeStr = s.time ? ` · ${s.time}` : '';
          const tags = [
            !s.confirmed ? `<div class="tt-tag warn">⚠ Not confirmed</div>` : '',
            isPast(s.date) ? `<div class="tt-tag past">Past event</div>` : ''
          ].join('');
          return `<div class="tt-stop"><div class="tt-date">${fmtDate(s.date)}${timeStr}</div><div class="tt-city">${s.city}</div><div class="tt-venue">${s.venue}</div>${s.owner ? `<div class="tt-venue">Owner: ${s.owner}</div>` : ''}${tags}</div>`;
        }).join('');
        tooltip.style.opacity = '1';
        tooltip.style.left = (x+16 > rect.width-270 ? x-264 : x+16) + 'px';
        tooltip.style.top = (y+10 > rect.height-120 ? y-tooltip.offsetHeight-8 : y+10) + 'px';
      })
      .on('mouseleave', () => { tooltip.style.opacity = '0'; });
  });
}

buildChips();
renderList();
</script>
</body>
</html>
